services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      BASE_URL: ${BASE_URL}
      DB_HOST: ${DB_HOST:-${APP_DB_HOST:-db}}
      DB_PORT: ${DB_PORT:-${APP_DB_PORT:-3306}}
      DB_USERNAME: ${DB_USERNAME:-${APP_DB_USERNAME:-vehiclereg_user}}
      DB_PASSWORD: "${DB_PASSWORD:-${APP_DB_PASSWORD:?DB_PASSWORD or APP_DB_PASSWORD must be set}}"
      DB_DATABASE: ${DB_DATABASE:-${DB_NAME:-${APP_DB_DATABASE:-vehicleregistrationsystem}}}
      DB_NAME: ${DB_DATABASE:-${DB_NAME:-${APP_DB_DATABASE:-vehicleregistrationsystem}}}
      DB_CHARSET: ${DB_CHARSET:-utf8mb4}
      DB_CONNECT_MAX_ATTEMPTS: ${DB_CONNECT_MAX_ATTEMPTS:-3}
      DB_CONNECT_RETRY_MS: ${DB_CONNECT_RETRY_MS:-250}
      DB_HOST_FALLBACKS: ${DB_HOST_FALLBACKS:-${APP_DB_HOST_FALLBACKS:-}}
      SESSION_SECURE: "true"
      SESSION_HTTP_ONLY: "true"
      DISPLAY_ERRORS: "false"
      LOG_ERRORS: "true"
      RUN_MIGRATIONS_ON_START: ${RUN_MIGRATIONS_ON_START:-false}
      WAIT_FOR_DB_ON_START: ${WAIT_FOR_DB_ON_START:-true}
      ALLOW_INSECURE_BASE_URL: ${ALLOW_INSECURE_BASE_URL:-false}
      DB_WAIT_MAX_ATTEMPTS: ${DB_WAIT_MAX_ATTEMPTS:-30}
      DB_WAIT_SLEEP_SECONDS: ${DB_WAIT_SLEEP_SECONDS:-2}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Vehicle Registration System}
      SMTP_REQUIRED: ${SMTP_REQUIRED:-false}
      OCR_SPACE_API_KEY: ${OCR_SPACE_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      ALLOWED_GOOGLE_DOMAIN: ${ALLOWED_GOOGLE_DOMAIN:-}
    security_opt:
      - no-new-privileges:true
    volumes:
      - uploads_data:/var/www/html/uploads
      - logs_data:/var/www/html/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${APP_PORT:-80}/health-check.php || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    expose:
      - "${APP_PORT:-80}"
    networks:
      - vrs_net

  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --port=${DB_PORT:-3306}
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-${DB_NAME:-${APP_DB_DATABASE:-vehicleregistrationsystem}}}
      MYSQL_USER: ${DB_USERNAME:-${APP_DB_USERNAME:-vehiclereg_user}}
      MYSQL_PASSWORD: "${DB_PASSWORD:-${APP_DB_PASSWORD:?DB_PASSWORD or APP_DB_PASSWORD must be set}}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-${APP_DB_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD or APP_DB_ROOT_PASSWORD must be set}}"
      MYSQL_TCP_PORT: ${DB_PORT:-${APP_DB_PORT:-3306}}
    security_opt:
      - no-new-privileges:true
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -P${DB_PORT:-3306} -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    expose:
      - "${DB_PORT:-3306}"
    networks:
      vrs_net:
        aliases:
          - db
          - mysql
          - database

volumes:
  db_data:
  uploads_data:
  logs_data:

networks:
  vrs_net:
    driver: bridge
