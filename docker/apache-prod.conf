ServerTokens Prod
ServerSignature Off
TraceEnable Off

<Directory /var/www/html>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

<Directory /var/www/html/database>
    Require all denied
</Directory>

<Directory /var/www/html/tests>
    Require all denied
</Directory>

<FilesMatch "^\.env">
    Require all denied
</FilesMatch>

<FilesMatch "\.(sql|log)$">
    Require all denied
</FilesMatch>

<FilesMatch "^(composer\.(json|lock)|phpunit\.xml)$">
    Require all denied
</FilesMatch>
